<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Subscribe to Agua na Casa</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Nunito Sans', sans-serif;
    }

    /* ── Card: two rows stacked ── */
    .card {
      background: #2ec8d4;
      border-radius: 20px;
      width: 780px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Top row: left text + right form */
    .card-top {
      display: flex;
      align-items: center;
      padding: 36px 40px 24px 40px;
    }

    /* Bottom row: logo + button sit here */
    .card-bottom {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0 40px 28px 40px;
      gap: 16px;
    }

    /* ── Left section ── */
    .left {
      flex: 0 0 260px;
      padding-right: 10px;
    }

    .left h1 {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 32px;
      color: #fff;
      line-height: 1.15;
      margin-bottom: 18px;
    }

    .left p {
      font-size: 13px;
      color: #fff;
      line-height: 1.65;
      font-weight: 400;
      max-width: 220px;
      text-align: justify;
    }

    /* ── Right / form section ── */
    .right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .form-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-row .lbl {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 13.5px;
      color: #fff;
      width: 170px;
      flex-shrink: 0;
      text-align: left;
    }

    .lbl-wrap { line-height: 1.3; }

    .ctrl { width: 200px; flex-shrink: 0; }

    .ctrl input,
    .ctrl select {
      width: 100%;
      border: none;
      border-radius: 4px;
      height: 28px;
      padding: 0 8px;
      font-size: 13px;
      font-family: 'Nunito Sans', sans-serif;
      background: #fff;
      color: #333;
      outline: none;
    }

    .ctrl select { color: #888; }

    /* Time picker */
    .time-wrap {
      display: flex;
      gap: 5px;
      width: 200px;
      flex-shrink: 0;
    }

    .time-wrap input[type="time"] {
      flex: 1;
      border: none;
      border-radius: 4px;
      height: 28px;
      padding: 0 6px;
      font-size: 13px;
      font-family: 'Nunito Sans', sans-serif;
      background: #fff;
      color: #333;
      outline: none;
    }

    .time-wrap select {
      width: 70px;
      border: none;
      border-radius: 4px;
      height: 28px;
      padding: 0 4px;
      font-size: 13px;
      font-family: 'Nunito Sans', sans-serif;
      background: #fff;
      color: #333;
      outline: none;
    }

    /* Total ₱ */
    .total-wrap {
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 4px;
      height: 28px;
      padding: 0 8px;
      width: 200px;
      flex-shrink: 0;
    }

    .total-wrap span {
      font-size: 13px;
      color: #333;
      margin-right: 3px;
    }

    .total-wrap input {
      border: none;
      outline: none;
      flex: 1;
      font-size: 13px;
      font-family: 'Nunito Sans', sans-serif;
      color: #333;
      background: transparent;
      padding: 0;
      height: 100%;
    }

    /* ── Logo placeholder ── */
    .logo-placeholder {
      width: 100px;
      height: 90px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }


    #logo-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 8px;
      display: block;
    }

    /* ── Subscribe button ── */
    .subscribe-btn {
      background: #fff;
      color: #1aabb8;
      border: none;
      border-radius: 30px;
      padding: 12px 28px;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 15px;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .subscribe-btn:hover { background: #e6fafb; }
  </style>
</head>
<body>
  <div class="card">

    <!-- TOP: text + form -->
    <div class="card-top">

      <!-- Left -->
      <div class="left">
        <h1>Subscribe to<br>Agua na Casa</h1>
        <p>Less hassle, more convenience. Subscribe and make every transaction feel lighter and easier from the start.</p>
      </div>

      <!-- Right / form -->
      <div class="right">

        <!-- User -->
        <div class="form-row">
          <span class="lbl">User</span>
          <div class="ctrl"><input type="text" /></div>
        </div>

        <!-- Station -->
        <div class="form-row">
          <span class="lbl">Station</span>
          <div class="ctrl">
            <select>
              <option value="" disabled selected>Select Location</option>
              <option>Station A</option>
              <option>Station B</option>
              <option>Station C</option>
            </select>
          </div>
        </div>

        <!-- Estimated time for pickup -->
        <div class="form-row">
          <span class="lbl lbl-wrap">Estimated time<br>for pickup</span>
          <div class="time-wrap">
            <input type="time" value="00:00" />
            <select>
              <option value="AM">AM</option>
              <option value="PM">PM</option>
            </select>
          </div>
        </div>

        <!-- Orders -->
        <div class="form-row">
          <span class="lbl">Orders</span>
          <div class="ctrl"><input type="text" /></div>
        </div>

        <!-- Total -->
        <div class="form-row">
          <span class="lbl">Total</span>
          <div class="total-wrap">
            <span>₱</span>
            <input type="text" />
          </div>
        </div>

      </div>
    </div>

    <!-- BOTTOM: logo + subscribe button -->
    <div class="card-bottom">
      <div class="logo-placeholder">
        <!-- Replace YOUR_IMAGE_PATH with your image file path e.g. "logo.png" -->
        <img id="logo-img" src="aguanacasa_logo_white.png" alt="Agua na Casa Logo" />
      </div>
      <button class="subscribe-btn">Subscribe Now</button>
    </div>

  </div>
</body>
</html>
