    <h1>Product Management</h1>
    <table id="products">
        <tr>    
            <th>Product</th>
            <th>Photo</th>
            <th>Price</th>
            <th>Actions</th>
        </tr>
        <!-- Table rows will be added here dynamically -->
        <div id="addgroup">
            <input type="file" id="photoUpload" accept="image/*">
            <input type="text" id="productNameInput" placeholder="Enter product name">
            <input type="text" id="priceInput" placeholder="Enter new price">
            <button onclick="uploadPhotoAndPrice()">Upload Photo and Update Price</button>
        </div>
    </table>

    <!-- File input for uploading photos -->

    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAzStYODU-4-Vp1leWyKN9GmNhPu8219Xg",
            authDomain: "aguanacasa-74ba1.firebaseapp.com",
            databaseURL: "https://aguanacasa-74ba1-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aguanacasa-74ba1",
            storageBucket: "aguanacasa-74ba1.appspot.com",
            messagingSenderId: "994613822213",
            appId: "1:994613822213:web:cce7bb901241d564b36d6c",
            measurementId: "G-3HYBS92MND"
        };
        firebase.initializeApp(firebaseConfig);

        // Get a reference to the products table in the database
        const productsRef = firebase.database().ref('products');

        // Function to upload photo, price, and product name
        function uploadPhotoAndPrice() {
            const file = document.getElementById('photoUpload').files[0];
            const price = document.getElementById('priceInput').value;
            const productName = document.getElementById('productNameInput').value; // Prompt user for product name

            // Check if product name is entered
            if (productName && productName.trim() !== "") {
                // Upload photo to Firebase Storage
                const storageRef = firebase.storage().ref('product_photos/' + file.name);
                storageRef.put(file).then(function (snapshot) {
                    console.log('Photo uploaded successfully!');

                    // Get the download URL of the uploaded photo
                    storageRef.getDownloadURL().then(function (photoUrl) {
                        // Add product data (product name, photo URL, and price) to the database
                        productsRef.push({
                            productName: productName,
                            photo: photoUrl,
                            price: price
                        });
                    }).catch(function (error) {
                        console.error('Error getting download URL: ', error);
                    });
                }).catch(function (error) {
                    console.error('Error uploading photo: ', error);
                });
            } else {
                console.error('Product name is required!');
            }
        }

        // Listen for changes in the products data and update the table dynamically
        productsRef.on('value', function (snapshot) {
            const productsTable = document.getElementById('products');
            productsTable.innerHTML = '<tr><th>Product</th><th>Photo</th><th>Price</th><th>Actions</th></tr>';

            snapshot.forEach(function (childSnapshot) {
                const productData = childSnapshot.val();
                const productName = productData.productName;
                const productPhoto = productData.photo;
                const productPrice = productData.price;

                const newRow = productsTable.insertRow();
                newRow.innerHTML = `
                    <td>${productName}</td>
                    <td><img src="${productPhoto}" alt="${productName}" style="width: 100px;"></td>
                    <td>${productPrice}</td>
                    <td>
                        <button onclick="editPrice('${productName}')">Edit Price</button>
                        <button onclick="editProductName('${productName}')">Edit Product Name</button>
                        <input type="file" id="newPhotoInput${productName}" accept="image/*">
                        <button onclick="replacePhoto('${productName}')">Replace Photo</button>
                    </td>
                `;
            });
        });
        // Function to edit product price
        function editPrice(productName) {
            const newPrice = prompt('Enter the new price:');
            if (newPrice !== null) {
                productsRef.child(productName).update({
                    price: newPrice
                });
            }
        }
        function editProductName(productName) {
            const newProductName = prompt('Enter the new product name:');
            if (newProductName !== null) {
                const productRef = productsRef.child(productName);
                productRef.once('value').then(function(snapshot) {
                    const productData = snapshot.val();
                    const updates = {};
                    updates[newProductName] = {
                        photo: productData.photo,
                        price: productData.price
                    };
                    productRef.remove().then(function() {
                        productsRef.update(updates);
                    }).catch(function(error) {
                        console.error('Error removing product: ', error);
                    });
                }).catch(function(error) {
                    console.error('Error getting product data: ', error);
                });
            }
        }

        function replacePhoto(productName) {
            const fileInput = document.getElementById('newPhotoInput' + productName);
            const file = fileInput.files[0];

            console.log('Replacing photo for product:', productName);
            console.log('Selected file:', file);

            if (file) {
                // Get the current product data
                const productRef = productsRef.child(productName);
                productRef.once('value').then(function(snapshot) {
                    const productData = snapshot.val();
                    console.log('Current product data:', productData);

                    const previousPhotoUrl = productData.photo;

                    // Delete the previous photo from Firebase Storage
                    if (previousPhotoUrl) {
                        const previousPhotoRef = firebase.storage().refFromURL(previousPhotoUrl);
                        previousPhotoRef.delete().then(function() {
                            console.log('Previous photo deleted successfully!');
                        }).catch(function(error) {
                            console.error('Error deleting previous photo: ', error);
                        });
                    }

                    // Upload new photo to Firebase Storage
                    const storageRef = firebase.storage().ref('product_photos/' + file.name);
                    storageRef.put(file).then(function(snapshot) {
                        console.log('New photo uploaded successfully!');

                        // Get the download URL of the uploaded photo
                        storageRef.getDownloadURL().then(function(photoUrl) {
                            // Update product data (photo URL) in the database
                            productRef.update({
                                photo: photoUrl
                            }).then(function() {
                                console.log('Product photo updated successfully!');
                            }).catch(function(error) {
                                console.error('Error updating product photo: ', error);
                            });
                        }).catch(function(error) {
                            console.error('Error getting download URL: ', error);
                        });
                    }).catch(function(error) {
                        console.error('Error uploading new photo: ', error);
                    });
                }).catch(function(error) {
                    console.error('Error fetching product data: ', error);
                });
            } else {
                console.error('No file selected!');
            }
        }



    </script>
