    <h1>User Accounts</h1>
    <div id="searchdiv">

    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAzStYODU-4-Vp1leWyKN9GmNhPu8219Xg",

            appId: "1:994613822213:web:cce7bb901241d564b36d6c",
            measurementId: "G-3HYBS92MND"
        };
        firebase.initializeApp(firebaseConfig);
        // Function to download and display the location photo
        function displayLocationPhoto(photoUrl, cell) {
            // Create a new image element
            const img = document.createElement('img');
            img.src = photoUrl;
            img.alt = 'Location Photo';
            img.style.width = '100px'; // Set the width of the image (adjust as needed)

            // Append the image to the specified table cell
            cell.appendChild(img);
        }
        // Event listener for save button click
        document.addEventListener('click', function (event) {
            const target = event.target;

            // Check if the clicked element is a save button
            if (target.tagName === 'BUTTON' && target.classList.contains('save-btn')) {
                const row = target.closest('tr');
                const station1fee = row.querySelector('.station1fee').textContent;
                const station2fee = row.querySelector('.station2fee').textContent;
                const station3fee = row.querySelector('.station3fee').textContent;
                const station4fee = row.querySelector('.station4fee').textContent;

                // Retrieve the user ID from the save button
                const userId = target.getAttribute('data-user-id');

                // Save the changes to the database (you need to implement this part)
                const userRef = firebase.database().ref('users/' + userId);

                userRef.update({
                    station1fee: station1fee,
                    station2fee: station2fee,
                    station3fee: station3fee,
                    station4fee: station4fee
                    // Add other properties if needed
                })
                .then(() => {
                    console.log('Changes saved successfully');
                })
                .catch(error => {
                    console.error('Error saving changes:', error);
                });

                // After saving, remove the contenteditable attribute
                row.querySelectorAll('[contenteditable="true"]').forEach(cell => {
                    cell.removeAttribute('contenteditable');
                });
            }
        });



        // Get a reference to the users table in the database
        const usersRef = firebase.database().ref('users');
// Function to populate the users table
function populateUsersTable() {
        const usersTable = document.getElementById('users-table').getElementsByTagName('tbody')[0];

        // Listen for changes in the users data and update the table dynamically
        usersRef.on('value', function(snapshot) {
            usersTable.innerHTML = ''; // Clear existing table rows

            snapshot.forEach(function(childSnapshot) {
                const userData = childSnapshot.val();
                const fullName = userData.fullName;
                const dateOfBirth = userData.dateOfBirth;
                const gender = userData.gender;
                const homeAddress = userData.homeAddress;
                const mobileNumber = userData.mobileNumber;
                const locationPhoto = userData.locationPhoto;
                const station1fee = userData.station1fee;
                const station2fee = userData.station2fee;
                const station3fee = userData.station3fee;
                const station4fee = userData.station4fee;


                const newRow = usersTable.insertRow();
                newRow.innerHTML = `
                    <td>${fullName}</td>
                    <td>${dateOfBirth}</td>
                    <td>${gender}</td>
                    <td>${homeAddress}</td>
                    <td>${mobileNumber}</td>
                    <td class="editable station1fee">${userData.station1fee}</td>
                    <td class="editable station2fee">${userData.station2fee}</td>
                    <td class="editable station3fee">${userData.station3fee}</td>
                    <td class="editable station4fee">${userData.station4fee}</td>
                    <td><a href="${locationPhoto}" download>Download Photo</a></td>
                    <td><button class="save-btn" data-user-id="${childSnapshot.key}">Save</button></td>
                    <!-- Add more table cells as needed for other user properties -->
                `;
            });
        });
    }

    // Call the function to populate the users table
    populateUsersTable();
    // Function to make a table cell editable
    function makeEditable(cell) {
        cell.setAttribute('contenteditable', 'true');
        cell.focus();
    }
    // Function to filter users based on the search input
    function searchUsers() {
        const searchInput = document.getElementById('search').value.toUpperCase();
        const usersTable = document.getElementById('users-table').getElementsByTagName('tbody')[0];
        const rows = usersTable.getElementsByTagName('tr');

        for (let i = 0; i < rows.length; i++) {
            const fullName = rows[i].getElementsByTagName('td')[0].innerText.toUpperCase();

            if (fullName.includes(searchInput)) {
                rows[i].style.display = '';
            } else {
                rows[i].style.display = 'none';
            }
        }
    }
    // Function to filter users based on the search input
    function searchaddress() {
        const searchInput = document.getElementById('searchadd').value.toUpperCase();
        const usersTable = document.getElementById('users-table').getElementsByTagName('tbody')[0];
        const rows = usersTable.getElementsByTagName('tr');

        for (let i = 0; i < rows.length; i++) {
            const fullName = rows[i].getElementsByTagName('td')[3].innerText.toUpperCase();

            if (fullName.includes(searchInput)) {
                rows[i].style.display = '';
            } else {
                rows[i].style.display = 'none';
            }
        }
    }

    // Function to clear the search input and show all users
    function clearSearch() {
        document.getElementById('search').value = '';
        const usersTable = document.getElementById('users-table').getElementsByTagName('tbody')[0];
        const rows = usersTable.getElementsByTagName('tr');

        for (let i = 0; i < rows.length; i++) {
            rows[i].style.display = '';
        }
    }


    // Event listener for double-click on station fee cells
    document.addEventListener('dblclick', function (event) {
        const target = event.target;

        // Check if the double-clicked element is a station fee cell
        if (target.tagName === 'TD' && target.classList.contains('editable')) {
            makeEditable(target);
        }
    });

    </script>
