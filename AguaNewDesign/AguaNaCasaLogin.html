<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="aguanacasa_logo_white.png" type="image/icon type">
  <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200;0,6..12,300;0,6..12,400;0,6..12,500;0,6..12,600;0,6..12,700;0,6..12,800;0,6..12,900;0,6..12,1000;1,6..12,200;1,6..12,300;1,6..12,400;1,6..12,500;1,6..12,600;1,6..12,700;1,6..12,800;1,6..12,900;1,6..12,1000&display=swap" rel="stylesheet">
  <title>AguaNaCasa - Login & Registration Form</title>
  <!-- Custom CSS File -->
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/8.4.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.4.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.4.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.4.1/firebase-storage.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<style>
  /* Reset some default styles */
  body, html {
    margin: 0;
    padding: 0;
    font-family: 'Nunito Sans', sans-serif;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #91C8E4, #19A7CE);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    margin-bottom: 100px;
    margin-top: 100px;
    max-width: 430px;
    width: 100%;
    background: #fff;
    border-radius: 7px;
    box-shadow: 0 5px 10px rgba(0, 0, 0, 0.3);
    overflow: hidden;
  }

  .form {
    padding: 2rem;
  }

  header {
    font-size: 2rem;
    font-weight: 500;
    text-align: center;
    margin-bottom: 1.5rem;
  }

  form {
    display: flex;
    flex-direction: column;
  }

  input {
    height: 60px;
    padding: 0 15px;
    font-size: 17px;
    margin-bottom: 1.3rem;
    font-family: 'Nunito Sans', sans-serif;
    border: 1px solid #ddd;
    border-radius: 6px;
    outline: none;
  }

  input:focus {
    box-shadow: 0 1px 0 rgba(0, 0, 0, 0.2);
  }

  .signup {
    font-size: 17px;
    text-align: center;
  }

  label {
    color: #19A7CE;
    cursor: pointer;
  }

  label:hover {
    text-decoration: underline;
  }

  .button {
    color: #fff;
    background: #91C8E4;
    font-size: 1.2rem;
    font-weight: 500;
    font-family: 'Nunito Sans', sans-serif;
    letter-spacing: 1px;
    margin-top: 1.7rem;
    cursor: pointer;
    transition: 0.4s;
  }

  .button:hover {
    background: #19A7CE;
  }
  #asklog{
    padding: 10px 10px;
  }
  .registration.form {
    display: none; /* Hide the registration form by default */
    padding: 30px 30px;
  }

  /* Additional CSS for the signup form */
  .registration.form form {
    margin-top: 20px;
  }

  .registration.form .input-field label {
    color: #19A7CE;
    font-family: 'Nunito Sans', sans-serif;
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 6px;
  }

  .registration.form input[type="text"],
  .registration.form input[type="password"],
  .registration.form input[type="date"],
  .registration.form input[type="number"],
  .registration.form input[type="file"] {
    height: 40px;
    padding: 0 10px;
    font-size: 16px;
    border: 1px solid #ddd;
    border-radius: 4px;
    outline: none;
    width: 93%;}
  .registration.form input[type="tel"]{
      height: 50px;
    font-size: 16px;
      width: 90%;
    }
    .registration.form select{
      width: 100%;
      height: 30px;
      font-size: 16px;
      padding: 0 10px;
    }
    .term{
      display: flex;
    }
</style>

<body>
  <div class="container">
    
    <div class="login form">
      <center> <img src="aguanacasa_logo_blue.png" width="200px"></center>
      <header>Login</header>
      <form id="loginForm">
        <input type="text" id="email" placeholder="Enter your email">
        <input type="password" id="password" placeholder="Enter your password">
        <input type="button" class="button" value="Login" onclick="login()">
      </form>
      <div class="signup">
        <span class="signup">Don't have an account?
          <label for="check" id="signupLabel">Signup</label>
        </span>
      </div>
    </div>
    <div class="registration form">
      <header>Signup</header>
      <form id="signupForm">
        <!-- Fields for registration -->
        <div class="input-field">
          <label>Email</label><br>
        <input type="text" id="signupEmail" placeholder="Enter your email" required>
        </div>
        <div class="input-field">
          <label>Password</label><br>
        <input type="text" id="signupPass" placeholder="Enter your password" required>
        </div>
        <div class="input-field">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="Enter your name" required>
        </div>
        <div class="input-field">
          <label>Date of Birth</label>
          <input type="date" id="dateOfBirth" required>
        </div>
        <div class="input-field">
          <label>Mobile Number</label>
          <input type="number" id="mobileNumber" placeholder="Enter mobile number" required>
        </div>
        <div class="input-field">
          <label>Gender</label><br>
          <select id="gender" required>
            <option disabled selected>Select gender</option>
            <option>Male</option>
            <option>Female</option>
          </select>
        </div>
        <div class="input-field">
          <label>Occupation</label>
          <input type="text" id="occupation" placeholder="Enter your occupation" required>
        </div>
        <div class="input-field">
          <label>ID Type</label><br>
          <select id="idType" required>
            <option disabled selected>Select ID</option>
            <option>Philippine passport</option>
            <option>Driver’s license</option>
            <option>PhilHealth ID</option>
            <option>TIN Card</option>
            <option>Postal ID</option>
            <option>Voter’s ID</option>
            <option>Professional Regulation Commission ID</option>
            <option>Senior Citizen ID</option>
          </select>
        </div>
        <div class="input-field">
          <label>Home Address</label>
          <input type="text" id="homeAddress" placeholder="Enter business address" required>
        </div>
        <div class="input-field">
          <label>Location Photo</label>
          <input type="file" id="locationPhoto" accept="image/*" required>
        </div>
        <div class="input-field">
          <label>Household Contact Number</label>
          <input type="tel" id="homeContactNumber" placeholder="Enter business contact number" required>
          <div class="term">
            <input type="checkbox" id="termbox" style="margin-right: 10px;"><label>I agree with the <a href="terms.html" target="_blank">Terms and Conditions</a> for signing up for AguaNaCasa</label>
          </div>
        </div>
        <input type="button" class="button" value="Signup" onclick="signup()">
      </form>
      <div >
        <center><span class="login">Already have an account?
          <label for="check" id="loginLabel">Login</label></center>
        </span>
      </div>
    </div> 
    </div>
  </div>
  <!-- Your Firebase configuration here -->
<script>
  // Initialize Firebase with your own configuration
  const firebaseConfig = {
    apiKey: "AIzaSyAzStYODU-4-Vp1leWyKN9GmNhPu8219Xg",
    authDomain: "aguanacasa-74ba1.firebaseapp.com",
    databaseURL: "https://aguanacasa-74ba1-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "aguanacasa-74ba1",
    storageBucket: "aguanacasa-74ba1.appspot.com",
    messagingSenderId: "994613822213",
    appId: "1:994613822213:web:cce7bb901241d564b36d6c",
    measurementId: "G-3HYBS92MND"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const database = firebase.database();

  const loginForm = document.querySelector(".login.form");
  const signupForm = document.querySelector(".registration.form");
  const loginLabel = document.getElementById("loginLabel");
  const signupLabel = document.getElementById("signupLabel");

  loginLabel.addEventListener("click", () => {
    loginForm.style.display = "block";
    signupForm.style.display = "none";
  });

  signupLabel.addEventListener("click", () => {
    loginForm.style.display = "none";
    signupForm.style.display = "block";
  });

  function signup() {
  const signupEmail = document.getElementById("signupEmail").value;
  const signupPassword = document.getElementById("signupPass").value;
  const fullName = document.getElementById("fullName").value;
  const dateOfBirth = document.getElementById("dateOfBirth").value;
  const mobileNumber = document.getElementById("mobileNumber").value;
  const gender = document.getElementById("gender").value;
  const occupation = document.getElementById("occupation").value;
  const idType = document.getElementById("idType").value;
  const homeAddress = document.getElementById("homeAddress").value;
  const locationPhotoInput = document.getElementById("locationPhoto");
  const homeContactNumber = document.getElementById("homeContactNumber").value;

  // Check if the checkbox is checked
  const termboxChecked = document.getElementById("termbox").checked;

  // If the checkbox is not checked, do not proceed with signup
  if (!termboxChecked) {
    alert("Please accept the terms and conditions before signing up.");
    return;
  }
  // Get the selected file from the input field
  const locationPhotoFile = locationPhotoInput.files[0];

  // Perform Firebase authentication
  auth.createUserWithEmailAndPassword(signupEmail, signupPassword)
    .then((userCredential) => {
      const userId = userCredential.user.uid;

      // Save all the user data to the Realtime Database
      const userData = {
        email: signupEmail,
        fullName: fullName,
        dateOfBirth: dateOfBirth,
        mobileNumber: mobileNumber,
        gender: gender,
        occupation: occupation,
        idType: idType,
        homeAddress: homeAddress,
        homeContactNumber: homeContactNumber,
        station1fee: "none",
        station2fee: "none",
        station3fee: "none",
        station4fee: "none",
        status: "not verified",
      };

      // Upload the location photo to Firebase Storage
      const storageRef = firebase.storage().ref();
      const locationPhotoRef = storageRef.child(`location_photos/${userId}_${Date.now()}_${locationPhotoFile.name}`);
      
      locationPhotoRef.put(locationPhotoFile)
        .then((snapshot) => {
          // Get the download URL of the uploaded photo
          return snapshot.ref.getDownloadURL();
        })
        .then((downloadURL) => {
          // Add the location photo URL to the user data
          userData.locationPhoto = downloadURL;

          // Save the data under the user's ID
          return database.ref("users/" + userId).set(userData);
        })
        .then(() => {
          // Registration successful, do something with userCredential.user
          alert("Registration successful");
          console.log("Registration successful");
          
          // Clear the form
          const signupFormElement = document.getElementById("signupForm");
          signupFormElement.reset(); // This will reset all form fields
        })
        .catch((error) => {
          // Handle errors that may occur during photo upload or database operations
          alert("Error: Invalid user information");
          console.error("Error: " + error.message);
          
        });
    })
    .catch((error) => {
      // Handle registration or authentication errors
      alert("Registration error: Email is invalid");
      console.error("Registration error: " + error.message);
      
    });
}
function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        firebase.auth().signInWithEmailAndPassword(email, password)
            .then((userCredential) => {
                console.log('Login successful');
                window.location.href = 'index.html?name=' + email;
            })
            .catch((error) => {
                alert(`Login failed: ${error.message}`);
            });
    }


</script>

</body>
</html>
