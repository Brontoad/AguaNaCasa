<h1>Order Page</h1>

  <!-- Include necessary libraries, e.g., jQuery and Firebase SDK -->

  <script>
    // Replace the following with your own Firebase project credentials
    var firebaseConfig = {
      apiKey: "AIzaSyAzStYODU-4-Vp1leWyKN9GmNhPu8219Xg",
            authDomain: "aguanacasa-74ba1.firebaseapp.com",

            measurementId: "G-3HYBS92MND"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);

    // Reference to the Firebase database
    var database = firebase.database();

    // Function to retrieve URL parameters from the URL
    function getParameterByName(name, url) {
      if (!url) url = window.location.href;
      name = name.replace(/[\[\]]/g, '\\$&');
      var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)'),
        results = regex.exec(url);
      if (!results) return null;
      if (!results[2]) return '';
      return decodeURIComponent(results[2].replace(/\+/g, ' '));
    }
    
    // Get the photo URL and user's email from the URL parameters
    var photoURL = getParameterByName('url');
    var userEmail = getParameterByName('name');

    // Declare the variable outside the fetchPhotoDetails function
    var photoDesc = "";
    var price = ""; // Add a new variable to store the price

    // Function to fetch the photo details from Firebase and update the page
    function fetchPhotoDetails() {
      var photoDescElement = document.getElementById('orderDescription');
      // var additionalDescElement = document.getElementById('additionalDescription');
      var priceElement = document.getElementById('price');

      // Fetch the photo details from Firebase using the photo URL as the key
      database.ref('productsphotos').orderByChild('url').equalTo(photoURL).once('value').then(function(snapshot) {
        var photoData = snapshot.val();

        if (photoData) {
          // If the photo exists in the database, update the page with the retrieved data
          var photoKey = Object.keys(photoData)[0];
          photoDesc = photoData[photoKey].description || "No description available";
          // var additionalDesc = photoData[photoKey].additionalDesc || "No additional description available";
          price = parseFloat(photoData[photoKey].price) || 0;


          photoDescElement.textContent = photoDesc;
          // additionalDescElement.textContent = additionalDesc;
          priceElement.textContent = 'Price: ₱' + price;
        } else {
          // If the photo does not exist in the database, display a message
          photoDescElement.textContent = 'Photo not found in the database.';
          // additionalDescElement.textContent = '';
          priceElement.textContent = '';
        }
      }).catch(function(error) {
        console.error('Error fetching photo details:', error);
      });
    }

    // Call the function to fetch and display the photo details
    fetchPhotoDetails();
    
    // Function to display the photo on the page
    function displayPhoto() {
      var orderPhotoElement = document.getElementById('orderPhoto');

      // Create an img element and set its src to the photo URL
      var photoImage = document.createElement('img');
      photoImage.src = photoURL;
      photoImage.alt = 'Photo';
      photoImage.style.maxWidth = '100%';
      orderPhotoElement.appendChild(photoImage);
    }

    // Call the function to display the photo
    displayPhoto();

// Add event listener to the "Add to Cart" button
document.getElementById('addToCartBtn').addEventListener('click', function() {
  var usName = getParameterByName('name');
  var usEmail = getParameterByName('email');
  var qtyInput = document.getElementById('qty');
  const qty = parseFloat(qtyInput.value);
  const totalLabel = document.getElementById('totsprice').innerHTML;



  // Save the order in Firebase with the user's name and email as keys and status as "pending"
  database.ref('productorders').push({
    name: usName,
    qty: qty,
    photoDesc: photoDesc,
    price: price,
    total: totalLabel,
    status: "pending"
  });

  console.log('Photo added to cart:', photoURL, photoDesc, price);
  alert('Photo added to cart! Check your "My Cart" section on the Home page.');
  window.location.href = 'product.html?name=' + userEmail; 
});




    // Add event listener to the "Back to Home" button
    document.getElementById('backToHomeBtn').addEventListener('click', function() {
      // Append the email parameter to the URL before navigating back to the "GalleryTest5.html" page
      var urlWithParams = 'product.html?name=' + userEmail;
      window.location.href = urlWithParams;
    });
    function calculateTotalPrice(inputId, totalId, priceID) {
  const qtyInput = document.getElementById(inputId);
  const totalLabel = document.getElementById(totalId);
  const priceElement = document.getElementById(priceID);

  if (qtyInput && totalLabel && priceElement) {
    const qty = parseFloat(qtyInput.value);
    const price = parseFloat(priceElement.textContent.replace('Price: ₱', ''));

    const total = price * qty;

    // Display the calculated total in the label
    totalLabel.textContent = total.toFixed(2); // Display the result with two decimal places

    //console.log(total + " " + price + " " + qty);
  }
}
document.addEventListener("DOMContentLoaded", function() {
        const emailParam = getParameterByName('name');

        // Check if the 'name' parameter is present
        if (emailParam) {
            toggleButtons(true); // User is logged in, so hide Sign In and show Logout
            modifyLinks(emailParam);
        } else {
            toggleButtons(false); // User is not logged in, so show Sign In and hide Logout
        }
    });

    // Function to get the value of a URL parameter by its name
    function getParameterByName(name, url) {
        if (!url) {
            url = window.location.href;
        }
        name = name.replace(/[\[\]]/g, '\\$&');
        var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)');
        var results = regex.exec(url);
        if (!results) return null;
        if (!results[2]) return '';
        return decodeURIComponent(results[2].replace(/\+/g, ' '));
    }

    // Function to modify links to forward the email parameter
    function modifyLinks(email) {
        const links = document.querySelectorAll('.forward-email');

        links.forEach(link => {
            link.addEventListener('click', function(event) {
                event.preventDefault();
                const href = link.getAttribute('href');
                if (email) {
                    window.location.href = `${href}?name=${email}`;
                } else {
                    window.location.href = href;
                }
            });
        });
    }

  </script>
