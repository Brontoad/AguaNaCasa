<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Subscribe to Agua na Casa</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f0f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Nunito Sans', sans-serif; }
    .card { background: #2ec8d4; border-radius: 20px; width: 780px; overflow: hidden; display: flex; flex-direction: column; }
    .card-top { display: flex; align-items: center; padding: 36px 40px 24px 40px; }
    .card-bottom { display: flex; justify-content: flex-end; align-items: center; padding: 0 40px 28px 40px; gap: 16px; }
    .left { flex: 0 0 260px; padding-right: 10px; }
    .left h1 { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 32px; color: #fff; line-height: 1.15; margin-bottom: 18px; }
    .left p { font-size: 13px; color: #fff; line-height: 1.65; font-weight: 400; max-width: 220px; text-align: justify; }
    .right { flex: 1; display: flex; flex-direction: column; gap: 9px; }
    .form-row { display: flex; align-items: center; gap: 10px; }
    .form-row .lbl { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13.5px; color: #fff; width: 170px; flex-shrink: 0; text-align: left; }
    .lbl-wrap { line-height: 1.3; }
    .ctrl { width: 200px; flex-shrink: 0; }
    .ctrl input { width: 100%; border: none; border-radius: 4px; height: 28px; padding: 0 8px; font-size: 13px; font-family: 'Nunito Sans', sans-serif; background: #fff; color: #333; outline: none; }
    .station-btn { width: 200px; height: 28px; border: none; border-radius: 4px; background: #fff; color: #888; font-size: 13px; font-family: 'Nunito Sans', sans-serif; cursor: pointer; text-align: left; padding: 0 8px; display: flex; align-items: center; justify-content: space-between; transition: background 0.15s ease; flex-shrink: 0; }
    .station-btn:hover { background: #f0fafa; }
    .station-btn .arrow { font-size: 10px; color: #aaa; }
    .station-btn.selected { color: #333; }
    .time-wrap { display: flex; gap: 5px; width: 200px; flex-shrink: 0; }
    .time-wrap input[type="time"] { flex: 1; border: none; border-radius: 4px; height: 28px; padding: 0 6px; font-size: 13px; font-family: 'Nunito Sans', sans-serif; background: #fff; color: #333; outline: none; }
    .time-wrap select { width: 70px; border: none; border-radius: 4px; height: 28px; padding: 0 4px; font-size: 13px; font-family: 'Nunito Sans', sans-serif; background: #fff; color: #333; outline: none; }
    .total-wrap { display: flex; align-items: center; background: #fff; border-radius: 4px; height: 28px; padding: 0 8px; width: 200px; flex-shrink: 0; }
    .total-wrap span { font-size: 13px; color: #333; margin-right: 3px; }
    .total-wrap input { border: none; outline: none; flex: 1; font-size: 13px; font-family: 'Nunito Sans', sans-serif; color: #333; background: transparent; padding: 0; height: 100%; }
    .orders-row-ctrl { display: flex; align-items: center; gap: 6px; width: 200px; flex-shrink: 0; }
    .orders-btn { flex: 1; height: 28px; border: none; border-radius: 4px; background: #fff; color: #888; font-size: 13px; font-family: 'Nunito Sans', sans-serif; cursor: pointer; text-align: left; padding: 0 8px; transition: background 0.15s ease; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .orders-btn:hover { background: #f0fafa; }
    .orders-btn.has-items { color: #2ec8d4; font-weight: 700; }
    .cart-btn { width: 28px; height: 28px; border: none; border-radius: 4px; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; transition: background 0.15s ease; flex-shrink: 0; }
    .cart-btn:hover { background: #f0fafa; }
    .cart-btn svg { width: 15px; height: 15px; stroke: #2ec8d4; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .cart-badge { position: absolute; top: -5px; right: -5px; background: #ef5350; color: #fff; font-size: 9px; font-weight: 900; border-radius: 50%; width: 14px; height: 14px; display: none; align-items: center; justify-content: center; }
    .cart-badge.show { display: flex; }
    .logo-placeholder { width: 100px; height: 90px; border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
    #logo-img { width: 100%; height: 100%; object-fit: contain; border-radius: 8px; display: block; }
    .subscribe-btn { background: #fff; color: #1aabb8; border: none; border-radius: 30px; padding: 12px 28px; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 15px; cursor: pointer; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.10); transition: background 0.2s; flex-shrink: 0; }
    .subscribe-btn:hover { background: #e6fafb; }
    .cart-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 100; align-items: center; justify-content: center; }
    .cart-overlay.open { display: flex; }
    .cart-drawer { background: #fff; border-radius: 16px; width: 360px; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.18); animation: popIn 0.2s ease; }
    @keyframes popIn { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }
    .cart-drawer-header { background: #2ec8d4; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
    .cart-drawer-header h3 { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 16px; color: #fff; }
    .close-btn { background: rgba(255,255,255,0.25); border: none; border-radius: 50%; width: 28px; height: 28px; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: 'Nunito', sans-serif; font-weight: 900; }
    .close-btn:hover { background: rgba(255,255,255,0.4); }
    .cart-drawer-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .cart-empty { text-align: center; color: #bbb; font-size: 13px; font-weight: 700; padding: 32px 0; }
    .cart-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0fafa; }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-left { display: flex; flex-direction: column; gap: 2px; }
    .cart-item-name { font-size: 13px; font-weight: 800; color: #333; }
    .cart-item-price { font-size: 11.5px; font-weight: 600; color: #2ec8d4; }
    .cart-item-right { display: flex; align-items: center; gap: 8px; }
    .qty-ctrl { display: flex; align-items: center; gap: 6px; }
    .qty-ctrl button { width: 22px; height: 22px; border: none; border-radius: 4px; background: #2ec8d4; color: #fff; font-size: 14px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: 'Nunito', sans-serif; line-height: 1; }
    .qty-ctrl button:hover { background: #28b5c0; }
    .qty-ctrl .qty-num { font-size: 13px; font-weight: 800; color: #333; min-width: 18px; text-align: center; }
    .remove-item-btn { background: none; border: none; color: #ef5350; font-size: 14px; cursor: pointer; padding: 0 2px; font-weight: 900; }
    .cart-drawer-footer { padding: 14px 20px; border-top: 1px solid #f0fafa; display: flex; align-items: center; justify-content: space-between; }
    .cart-total-label { font-size: 13px; font-weight: 800; color: #555; }
    .cart-total-amount { font-size: 16px; font-weight: 900; color: #2ec8d4; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-top">
      <div class="left">
        <h1>Subscribe to<br>Agua na Casa</h1>
        <p>Less hassle, more convenience. Subscribe and make every transaction feel lighter and easier from the start.</p>
      </div>
      <div class="right">
        <div class="form-row">
          <span class="lbl">User</span>
          <div class="ctrl"><input type="text" id="user-input" placeholder="Enter name" /></div>
        </div>
        <div class="form-row">
          <span class="lbl">Station</span>
          <button class="station-btn" id="station-btn" onclick="goToStation()">
            <span id="station-label">Select Location</span>
            <span class="arrow">▶</span>
          </button>
        </div>
        <div class="form-row">
          <span class="lbl lbl-wrap">Estimated time<br>for pickup</span>
          <div class="time-wrap">
            <input type="time" value="00:00" id="pickup-time"/>
            <select id="pickup-ampm"><option value="AM">AM</option><option value="PM">PM</option></select>
          </div>
        </div>
        <div class="form-row">
          <span class="lbl">Orders</span>
          <div class="orders-row-ctrl">
            <button class="orders-btn" id="orders-btn" onclick="goToProducts()">Select Products</button>
            <button class="cart-btn" onclick="openCart()" title="View cart">
              <svg viewBox="0 0 24 24">
                <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
              </svg>
              <span class="cart-badge" id="cart-badge">0</span>
            </button>
          </div>
        </div>
        <div class="form-row">
          <span class="lbl">Total</span>
          <div class="total-wrap">
            <span>₱</span>
            <input type="text" id="total-input" readonly placeholder="0" />
          </div>
        </div>
      </div>
    </div>
    <div class="card-bottom">
      <div class="logo-placeholder">
        <img id="logo-img" src="aguanacasa_logo_white.png" alt="Agua na Casa Logo" />
      </div>
      <button class="subscribe-btn">Subscribe Now</button>
    </div>
  </div>

  <div class="cart-overlay" id="cart-overlay" onclick="handleOverlayClick(event)">
    <div class="cart-drawer">
      <div class="cart-drawer-header">
        <h3>🛒 Your Cart</h3>
        <button class="close-btn" onclick="closeCart()">✕</button>
      </div>
      <div class="cart-drawer-body" id="cart-body">
        <div class="cart-empty" id="cart-empty">No items added yet.<br>Tap <b>Select Products</b> to add.</div>
      </div>
      <div class="cart-drawer-footer">
        <span class="cart-total-label">Total</span>
        <span class="cart-total-amount" id="cart-total-display">₱0</span>
      </div>
    </div>
  </div>

<script>
  // ── Read cart from URL (passed back from products page) ──
  let cart = [];

  const params = new URLSearchParams(window.location.search);

  // Restore cart from URL
  if (params.get('cart')) {
    try { cart = JSON.parse(decodeURIComponent(params.get('cart'))); } catch(e) { cart = []; }
  }

  // Restore station from URL
  if (params.get('station')) {
    document.getElementById('station-label').textContent = params.get('station');
    document.getElementById('station-btn').classList.add('selected');
  }

  function calcTotal() {
    return cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
  }

  function updateUI() {
    const totalQty = cart.reduce((s, i) => s + i.qty, 0);
    const badge = document.getElementById('cart-badge');
    badge.textContent = totalQty;
    badge.classList.toggle('show', totalQty > 0);

    const btn = document.getElementById('orders-btn');
    if (totalQty > 0) {
      btn.textContent = cart.map(i => `${i.qty}x ${i.name}`).join(', ');
      btn.classList.add('has-items');
    } else {
      btn.textContent = 'Select Products';
      btn.classList.remove('has-items');
    }
    document.getElementById('total-input').value = calcTotal() || '';
  }

  function goToProducts() {
    const cartParam = encodeURIComponent(JSON.stringify(cart));
    window.location.href = 'SUBSCRIPTIONPRODCUTS.html?cart=' + cartParam;
  }

  function goToStation() {
    const cartParam = encodeURIComponent(JSON.stringify(cart));
    window.location.href = 'station.html?cart=' + cartParam;
  }

  function renderCartDrawer() {
    const body = document.getElementById('cart-body');
    const empty = document.getElementById('cart-empty');
    body.innerHTML = '';
    if (cart.length === 0) {
      body.appendChild(empty);
      empty.style.display = 'block';
      document.getElementById('cart-total-display').textContent = '₱0';
      return;
    }
    empty.style.display = 'none';
    cart.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'cart-item';
      div.innerHTML = `
        <div class="cart-item-left">
          <span class="cart-item-name">${item.name}</span>
          <span class="cart-item-price">₱${item.price} each · ₱${item.price * item.qty} total</span>
        </div>
        <div class="cart-item-right">
          <div class="qty-ctrl">
            <button onclick="changeQty(${idx},-1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button onclick="changeQty(${idx},1)">+</button>
          </div>
          <button class="remove-item-btn" onclick="removeItem(${idx})">✕</button>
        </div>`;
      body.appendChild(div);
    });
    document.getElementById('cart-total-display').textContent = '₱' + calcTotal();
  }

  function changeQty(idx, delta) {
    cart[idx].qty += delta;
    if (cart[idx].qty <= 0) cart.splice(idx, 1);
    updateUI();
    renderCartDrawer();
  }

  function removeItem(idx) {
    cart.splice(idx, 1);
    updateUI();
    renderCartDrawer();
  }

  function openCart() {
    renderCartDrawer();
    document.getElementById('cart-overlay').classList.add('open');
  }

  function closeCart() {
    document.getElementById('cart-overlay').classList.remove('open');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('cart-overlay')) closeCart();
  }

  updateUI();
</script>
</body>
</html>
