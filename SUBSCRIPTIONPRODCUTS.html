<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products – Agua na Casa</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #e8f7f8; min-height: 100vh; font-family: 'Nunito Sans', sans-serif; padding: 28px 20px 40px; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; max-width: 1000px; margin-left: auto; margin-right: auto; }
    .back-btn { background: #2ec8d4; border: none; border-radius: 10px; padding: 9px 18px; color: #fff; font-size: 13px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
    .back-btn:hover { background: #28b5c0; }
    .back-btn svg { width: 15px; height: 15px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .page-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 20px; color: #2ec8d4; }
    .confirm-btn { background: #2ec8d4; border: none; border-radius: 20px; padding: 10px 24px; color: #fff; font-size: 13px; font-weight: 900; font-family: 'Nunito', sans-serif; cursor: pointer; transition: background 0.15s; }
    .confirm-btn:hover { background: #28b5c0; }
    .grid { display: flex; flex-wrap: wrap; gap: 18px; justify-content: center; max-width: 1000px; margin: 0 auto; }
    .product-card { background: #2ec8d4; border-radius: 16px; width: 250px; padding: 18px 18px 16px; display: flex; flex-direction: column; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .card-name { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 13.5px; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; }
    .card-price { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 13.5px; color: #fff; }
    .card-img { display: flex; align-items: center; justify-content: center; height: 130px; margin-bottom: 12px; }
    .card-divider { border: none; border-top: 1px solid rgba(255,255,255,0.35); margin-bottom: 10px; }
    .qty-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .qty-label { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 12.5px; color: #fff; margin-right: auto; }
    .qty-input { width: 52px; height: 26px; border: none; border-radius: 4px; text-align: center; font-size: 13px; font-weight: 800; font-family: 'Nunito', sans-serif; color: #333; outline: none; }
    .qty-price { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 12.5px; color: #fff; }
    .fee-row, .total-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.9); font-weight: 600; margin-bottom: 4px; }
    .total-row { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 13px; color: #fff; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="top-bar">
    <button class="back-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <span class="page-title">Select Products</span>
    <button class="confirm-btn" onclick="confirmOrders()">Confirm Orders</button>
  </div>

  <div class="grid" id="product-grid"></div>

<script>
  const PRODUCTS = [
    { id: 'mineral',   name: 'Mineral',   price: 15, fee: 0 },
    { id: 'distilled', name: 'Distilled', price: 30, fee: 0 },
    { id: 'alkaline',  name: 'Alkaline',  price: 25, fee: 0 },
    { id: 'purified',  name: 'Purified',  price: 30, fee: 0 },
    { id: 'tba',       name: 'Spring',       price: 0,  fee: 0 },
  ];

  const IMGS = {
    mineral:   `<img src="mineral9.png"   alt="Mineral"   style="width:150px;height:170px;object-fit:contain;"/>`,
    distilled: `<img src="distilled9.png" alt="Distilled" style="width:150px;height:170px;object-fit:contain;"/>`,
    alkaline:  `<img src="alkaline9.png"  alt="Alkaline"  style="width:150px;height:170px;object-fit:contain;"/>`,
    purified:  `<img src="purified9.png"  alt="Purified"  style="width:150px;height:170px;object-fit:contain;"/>`,
    tba:       `<img src="tba9.png"       alt="TBA"       style="width:150px;height:170px;object-fit:contain;"/>`,
  };

  // ── Read cart from URL ──
  const params = new URLSearchParams(window.location.search);
  let cart = [];
  if (params.get('cart')) {
    try { cart = JSON.parse(decodeURIComponent(params.get('cart'))); } catch(e) { cart = []; }
  }

  function getCartQty(id) {
    const item = cart.find(i => i.id === id);
    return item ? item.qty : 0;
  }

  function buildCards() {
    const grid = document.getElementById('product-grid');
    grid.innerHTML = '';
    PRODUCTS.forEach(p => {
      const qty = getCartQty(p.id);
      const card = document.createElement('div');
      card.className = 'product-card';
      card.id = 'card-' + p.id;
      card.innerHTML = `
        <div class="card-header">
          <span class="card-name">${p.name}</span>
          <span class="card-price">₱${p.price}</span>
        </div>
        <div class="card-img">${IMGS[p.id]}</div>
        <hr class="card-divider"/>
        <div class="qty-row">
          <span class="qty-label">QTY</span>
          <input class="qty-input" type="number" min="0" value="${qty}" id="qty-${p.id}" oninput="updateCard('${p.id}')"/>
          <span class="qty-price" id="qprice-${p.id}">₱${p.price * qty}</span>
        </div>
        <div class="fee-row">
          <span>Delivery Fee per Gallon</span>
          <span id="fee-${p.id}">₱${p.fee}</span>
        </div>
        <div class="total-row">
          <span>Total Price</span>
          <span id="total-${p.id}">₱${p.price * qty + p.fee}</span>
        </div>`;
      grid.appendChild(card);
    });
  }

  function updateCard(id) {
    const p = PRODUCTS.find(p => p.id === id);
    const qty = Math.max(0, parseInt(document.getElementById('qty-' + id).value) || 0);
    document.getElementById('qprice-' + id).textContent = '₱' + (p.price * qty);
    document.getElementById('total-' + id).textContent  = '₱' + (p.price * qty + p.fee);
    const idx = cart.findIndex(i => i.id === id);
    if (qty > 0) {
      if (idx >= 0) cart[idx].qty = qty;
      else cart.push({ id, name: p.name, price: p.price, qty });
    } else {
      if (idx >= 0) cart.splice(idx, 1);
    }
  }

  function goBackToSubscription() {
    const cartParam = encodeURIComponent(JSON.stringify(cart));
    window.location.href = 'SUBSCRIPTION.html?cart=' + cartParam;
  }

  function confirmOrders() { goBackToSubscription(); }
  function goBack()         { goBackToSubscription(); }

  buildCards();
</script>
</body>
</html>
