         /* The switch - the box around the slider */
        .switch {
        margin-left: 10%;
        position: relative;
        display: inline-block;
        width: 60px;
        height: 34px;
        }

        /* Hide default HTML checkbox */
        .switch input {
        opacity: 0;
        width: 0;
        height: 0;
        }

        /* The slider */
        .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        -webkit-transition: .4s;
        transition: .4s;
        }

        .slider:before {
        position: absolute;
        content: "";
        height: 26px;
        width: 26px;
        left: 4px;
        bottom: 4px;
        background-color: white;
        -webkit-transition: .4s;
        transition: .4s;
        }

        input:checked + .slider {
        background-color: #2196F3;
        }

        input:focus + .slider {
        box-shadow: 0 0 1px #2196F3;
        }

        input:checked + .slider:before {
        -webkit-transform: translateX(26px);
        -ms-transform: translateX(26px);
        transform: translateX(26px);
        }

        /* Rounded sliders */
        .slider.round {
        border-radius: 34px;
        }

        .slider.round:before {
        border-radius: 50%;
        }

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzStYODU-4-Vp1leWyKN9GmNhPu8219Xg",

            databaseURL: "https://aguanacasa-74ba1-default-rtdb.asia-southeast1.firebasedatabase.app",

            appId: "1:994613822213:web:cce7bb901241d564b36d6c",
            measurementId: "G-3HYBS92MND"
        };
        firebase.initializeApp(firebaseConfig);

        const database = firebase.database();
        const ordersTableBody = document.querySelector("#orderstable tbody");

        function populateOrdersTable() {
    const instantOrdersRef = database.ref("instantOrders");
    instantOrdersRef.orderByChild("branch").equalTo("Station 1").on("value", function(snapshot) {
        ordersTableBody.innerHTML = ""; // Clear existing table rows

        snapshot.forEach(function(childSnapshot) {
            const order = childSnapshot.val();
            const orderId = childSnapshot.key;

            // Check if the order status is "processed"
            if (order.status === "processed") {
                const row = ordersTableBody.insertRow();
                row.insertCell().textContent = orderId;
                row.insertCell().textContent = order.branch;
                row.insertCell().textContent = order.email;
                row.insertCell().textContent = order.qty;
                row.insertCell().textContent = order.type;
                row.insertCell().textContent = order.date;
                row.insertCell().textContent = order.location;
                row.insertCell().textContent = order.totalPrice;
                row.insertCell().textContent = order.status;
            }
        });
    });
}

// Call the function to populate the orders table
populateOrdersTable();
