    // Function to hide or show the Sign In and Logout buttons
    function toggleButtons(isLoggedIn) {
        const signInBtn = document.getElementById('signInBtn');
        const logoutBtnContainer = document.getElementById('logoutBtnContainer');

        if (isLoggedIn) {
            signInBtn.style.display = 'none'; // Hide Sign In
            logoutBtnContainer.style.display = 'block'; // Show Logout
        } else {
            signInBtn.style.display = 'block'; // Show Sign In
            logoutBtnContainer.style.display = 'none'; // Hide Logout
        }
    }

    // Example Firebase code for logging out
    function logout() {
        firebase.auth().signOut().then(function() {
            // Sign-out successful, you can redirect the user to the login page
            window.location.href = "AguaNaCasaLogin.html";
        }).catch(function(error) {
            // An error happened.
            console.error("Logout error: " + error);
        });
    }

    document.addEventListener("DOMContentLoaded", function() {
        const emailParam = getParameterByName('name');

        // Check if the 'name' parameter is present
        if (emailParam) {
            toggleButtons(true); // User is logged in, so hide Sign In and show Logout
            modifyLinks(emailParam);
        } else {
            toggleButtons(false); // User is not logged in, so show Sign In and hide Logout
        }
    });

    // Function to get the value of a URL parameter by its name
    function getParameterByName(name, url) {
        if (!url) {
            url = window.location.href;
        }
        name = name.replace(/[\[\]]/g, '\\$&');
        var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)');
        var results = regex.exec(url);
        if (!results) return null;
        if (!results[2]) return '';
        return decodeURIComponent(results[2].replace(/\+/g, ' '));
    }

    // Function to modify links to forward the email parameter
    function modifyLinks(email) {
        const links = document.querySelectorAll('.forward-email');

        links.forEach(link => {
            link.addEventListener('click', function(event) {
                event.preventDefault();
                const href = link.getAttribute('href');
                if (email) {
                    window.location.href = `${href}?name=${email}`;
                } else {
                    window.location.href = href;
                }
            });
        });
    }
   // Function to process an order
function processOrder(orderId) {
    // Get a reference to the specific order in the database
    const database = firebase.database();
    const orderRef = database.ref('productorders/' + orderId);

    // Fetch the order data
    orderRef.once('value')
        .then(function (snapshot) {
            const order = snapshot.val();

            // Check if the order status is already "Processed"
            if (order.status === 'Processed') {
                alert('Order is already processed.');
                console.log('Order is already processed.');
            } else {
                // Ask for confirmation before updating the status
                var result = confirm("Are you sure you want to process this order?");
                if (result) {
                    // Update the status to "Processed"
                    orderRef.update({ status: 'Processed' })
                        .then(function () {
                            console.log('Order processed successfully!');
                        })
                        .catch(function (error) {
                            console.error("Error processing order: ", error);
                        });
                } else {
                    // The user clicked "Cancel" in the confirmation dialog
                    console.log('Order processing canceled.');
                }
            }
        })
        .catch(function (error) {
            console.error("Error fetching order data: ", error);
        });
}

// Function to cancel an order
function cancelOrder(orderId) {
    // Get a reference to the specific order in the database
    const database = firebase.database();
    const orderRef = database.ref('productorders/' + orderId);

    // Check if the status is "pending" before deleting the order
    orderRef.once('value')
        .then(function (snapshot) {
            const order = snapshot.val();
            if (order && order.status === 'pending') {
                var result = confirm("Are you sure you want to proceed?");
                // Check the result
                if (result) {
                    // The user clicked "OK"
                    // Delete the order
                    orderRef.remove()
                        .then(function () {
                            alert("Order canceled and removed successfully!");
                            location.reload();
                        })
                        .catch(function (error) {
                            console.error("Error canceling order:", error);

// Function to retrieve URL parameters from the URL
function getParameterByName(name, url) {
    if (!url) url = window.location.href;
    name = name.replace(/[\[\]]/g, '\\$&');
    var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)'),
    results = regex.exec(url);
    if (!results) return null;
    if (!results[2]) return '';
    return decodeURIComponent(results[2].replace(/\+/g, ' '));
}

// Function to fetch data from Firebase and populate the photo gallery
function populateGallery() {
    var photoGallery = document.getElementById('photoGallery');
    database.ref('productsphotos').on('value', function (snapshot) {
    photoGallery.innerHTML = ''; // Clear the previous content

    // Create a table element
    var photoTable = document.createElement('table');
    photoTable.classList.add('photo-table');
    var tableRow;

    var count = 0;
    snapshot.forEach(function (childSnapshot) {
        if (count % 6 === 0) {
        // Start a new table row every 6 photos
        tableRow = document.createElement('tr');
        photoTable.appendChild(tableRow);
        }

        var photoData = childSnapshot.val();
        var photoURL = photoData.url;
        var photoDesc = photoData.description;

        // Create a cell to display the photo, its description, the price, and the "Buy Now" button
        var cell = document.createElement('td');
        var photoElement = document.createElement('img');
        photoElement.src = photoURL;
        photoElement.alt = photoDesc;
        cell.appendChild(photoElement);

        // Create a container to hold the description, price, and the "Buy Now" button
        var descriptionContainer = document.createElement('div');
        descriptionContainer.id = 'descdiv';

        var descriptionElement = document.createElement('p');
        descriptionElement.textContent = photoDesc;
        descriptionElement.classList.add('photo-description'); // Add the class for styling
        descriptionContainer.appendChild(descriptionElement);

        var priceElement = document.createElement('p');
        var price = photoData.price || "Price not available";
        priceElement.textContent = 'Price: P' + price;
        priceElement.classList.add('photo-price'); // Add the class for styling
        descriptionContainer.appendChild(priceElement);

        var buyNowButton = document.createElement('button');
        buyNowButton.textContent = 'Select Quantity';
        buyNowButton.classList.add('buy-now-button'); // Add the class for styling
        buyNowButton.addEventListener('click', function () {
        goToOrderPage(photoURL, photoDesc);
        });
        descriptionContainer.appendChild(buyNowButton);

        cell.appendChild(descriptionContainer);

        tableRow.appendChild(cell);

        count++;
    });

    photoGallery.appendChild(photoTable);
    });
